<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Emisor Común</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="site-tag">radioemisorcomun.xyz</span>
  </header>

  <main>
    <section class="title-block">
      <h1>Radio<br>Emisor<br>Común</h1>
      <p class="subtitle">proyecto cibernético-analógico-sonoro</p>
    </section>

    <section class="figure-block">
      <figure>
        <svg viewBox="0 0 340 400" xmlns="http://www.w3.org/2000/svg" aria-label="Transistor BJT NPN">
          <!-- Package circle -->
          <circle cx="170" cy="200" r="110" fill="none" stroke="#111" stroke-width="2"/>
          <circle cx="170" cy="200" r="113" fill="none" stroke="#111" stroke-width="0.4" opacity="0.4"/>

          <!-- Vertical base line -->
          <line x1="170" y1="130" x2="170" y2="270" stroke="#111" stroke-width="2.5"/>

          <!-- Collector -->
          <line x1="170" y1="155" x2="220" y2="130" stroke="#111" stroke-width="2"/>
          <line x1="220" y1="130" x2="220" y2="60"  stroke="#111" stroke-width="2"/>
          <polygon points="213,140 220,130 227,140" fill="#111"/>

          <!-- Emitter -->
          <line x1="170" y1="245" x2="220" y2="270" stroke="#111" stroke-width="2"/>
          <line x1="220" y1="270" x2="220" y2="340" stroke="#111" stroke-width="2"/>
          <polygon points="213,258 220,270 227,258" fill="#111"/>

          <!-- Base -->
          <line x1="170" y1="200" x2="30" y2="200" stroke="#111" stroke-width="2"/>

          <!-- Terminal dots -->
          <circle cx="220" cy="60"  r="4" fill="#111"/>
          <circle cx="220" cy="340" r="4" fill="#111"/>
          <circle cx="30"  cy="200" r="4" fill="#111"/>

          <!-- Labels -->
          <text x="232" y="56"  font-family="serif" font-size="13">C</text>
          <text x="232" y="348" font-family="serif" font-size="13">E</text>
          <text x="10"  y="205" font-family="serif" font-size="13">B</text>

          <text x="118" y="212" font-family="monospace" font-size="10" fill="#555">NPN</text>
          <text x="52"  y="338" font-family="monospace" font-size="9"  fill="#888">2N2222A</text>
        </svg>
        <figcaption>Transistor BJT — 2N2222A</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>radioemisorcomun.xyz es un proyecto de colaboración entre <a href="https://piruetas.xyz"> piruetas.xyz </a> y <a href="https://poxirecords.com"> poxirecords </a> </p>
  </footer>

</body>
</html>
